name: Publish AEM build assets

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: publish-aem-dist-main
  cancel-in-progress: true

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Commit generated AEM assets
        run: |
          git add --all -- aem-dist
          if git diff --cached --quiet; then
            echo "aem-dist is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Build AEM production assets"
          git push origin HEAD:main
